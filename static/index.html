<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anime Mannequin Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a1a; color: #eee; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
#toolbar { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: #2a2a2a; border-bottom: 1px solid #444; flex-shrink: 0; }
#toolbar h1 { font-size: 13px; font-weight: bold; color: #fff; margin-right: 4px; }
.toolbar-sep { width: 1px; height: 20px; background: #555; margin: 0 2px; flex-shrink: 0; }
button { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; white-space: nowrap; }
button:disabled { opacity: 0.45; cursor: not-allowed; }
#btn-gender { background: #1565c0; color: #fff; min-width: 36px; }
#btn-undo, #btn-reset { background: #333; color: #aaa; }
#btn-mirror-lr, #btn-mirror-rl { background: #333; color: #aaa; }
#btn-poses { background: #333; color: #aaa; }
#btn-random { background: #6a1b9a; color: #fff; }
#btn-random-mode { background: #333; color: #aaa; padding: 5px 8px; font-size: 14px; }
#btn-random-mode.wild { background: #bf360c; color: #fff; }
#btn-props { background: #333; color: #aaa; }
#btn-props.active { background: #4a6080; color: #cdf; }
#btn-colors { background: #333; color: #aaa; min-width: 68px; }
#btn-colors.active { background: #555; color: #fff; }
#btn-save { background: #2e7d32; color: #fff; display: none; min-width: 110px; margin-left: auto; }
#btn-save.saving { background: #1b5e20; }

#canvas-wrap { flex: 1; position: relative; overflow: hidden; }
canvas { display: block; width: 100%; height: 100%; }

/* Crop frame — shows the output aspect ratio as a framing guide */
#crop-frame {
    position: absolute;
    pointer-events: none;
    border: 1.5px solid rgba(255, 255, 255, 0.55);
    /* Outer glow so it stays visible against light backgrounds */
    outline: 1px solid rgba(0, 0, 0, 0.35);
    z-index: 5;
    display: none;
    /* Corner dots for better visibility */
    box-sizing: border-box;
}

/* Floating export buttons — standalone only, bottom-left of canvas */
#export-bar {
    display: none;
    position: absolute; bottom: 12px; left: 12px;
    gap: 6px; z-index: 10;
    flex-direction: column; align-items: flex-start;
}
#export-bar button {
    background: rgba(21,101,192,0.85); color: #fff;
    backdrop-filter: blur(4px);
    padding: 6px 14px; font-size: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
#export-bar button:hover { background: rgba(21,101,192,1); }

/* ComfyUI status overlay — bottom of canvas */
#status-bar {
    display: none;
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 4px 12px; background: rgba(0,0,0,0.55);
    font-size: 11px; color: #aaa;
    pointer-events: none;
}

/* Loading overlay */
#loading-overlay {
    position: absolute; inset: 0;
    background: rgba(20,20,20,0.85);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999; gap: 16px;
    pointer-events: none;
    transition: opacity 0.2s ease;
}
#loading-overlay.hidden { opacity: 0; }
.spinner {
    width: 48px; height: 48px;
    border: 4px solid #444; border-top-color: #4fc3f7;
    border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-msg { font-size: 14px; color: #ccc; letter-spacing: 0.03em; }
</style>
</head>
<body>
<div id="toolbar">
  <h1>Mannequin</h1>
  <div class="toolbar-sep"></div>
  <button id="btn-gender" title="Toggle gender (F / M)">F</button>
  <div class="toolbar-sep"></div>
  <button id="btn-undo"      title="Undo last rotation (Ctrl+Z)">Undo</button>
  <button id="btn-reset"     title="Reset all bones to default pose">Reset</button>
  <button id="btn-mirror-lr" title="Copy left side → right side">L→R</button>
  <button id="btn-mirror-rl" title="Copy right side → left side">R→L</button>
  <div class="toolbar-sep"></div>
  <button id="btn-poses"       title="Open saved pose library">Poses</button>
  <button id="btn-random"      title="Generate random pose">Random</button>
  <button id="btn-random-mode" title="Safe: anatomical limits  |  click for Wild">🔒</button>
  <div class="toolbar-sep"></div>
  <button id="btn-props"   title="Model Control: proportions, ground plane">Model</button>
  <button id="btn-colors" class="active" title="Toggle joint colors: OpenPose rainbow / flat grey">OpenPose</button>
  <button id="btn-bust-dbg" title="Bust debug panel">Bust⚙</button>
  <button id="btn-save" title="Capture images and save to ComfyUI node">Close &amp; Save</button>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>

  <!-- standalone download buttons — float over canvas, bottom-left -->
  <div id="export-bar">
    <button id="btn-dl-pose"  title="Download pose render as PNG">⬇ pose.png</button>
    <button id="btn-dl-depth" title="Download depth map as PNG">⬇ depth.png</button>
    <button id="btn-dl-canny" title="Download Canny edge map as PNG">⬇ canny.png</button>
  </div>

  <!-- comfyui progress — bottom strip -->
  <div id="status-bar"><span id="status">Ready</span></div>

  <!-- Crop frame: shows the output W×H aspect ratio as a framing guide -->
  <div id="crop-frame"></div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-msg">Loading model…</div>
  </div>
</div>

<script type="module">
import * as THREE from './lib/three.module.js';
import { MannequinRenderer } from './src/mannequin-renderer.js';
import { MannequinEditor }   from './src/mannequin-editor.js';
import { ComfyuiBridge }     from './src/comfyui-bridge.js';
import { defaultScene, jsonToScene } from './src/mannequin-model.js';
import { PoseLibrary } from './src/pose-library.js';
import { ProportionsPanel } from './src/proportions-panel.js';
import { BustDebugPanel } from './src/bust-debug-panel.js';
import { AppStore, defaultState } from './src/app-store.js';
import { CommandHistory } from './src/commands.js';

const params = new URLSearchParams(location.search);
const mode   = params.get('mode') ?? 'standalone';

// ── Store + History (Phase 3-5 architecture) ───────────────────────────────────
const gender = params.get('gender') ?? 'F';
const store   = new AppStore(defaultState(gender));
const history = new CommandHistory(20);

const canvas   = document.getElementById('c');
const renderer = new MannequinRenderer(canvas, store);  // Phase 3: renderer subscribes to store
const editor   = new MannequinEditor(renderer, canvas, store);  // Phase 4
const poseLib  = new PoseLibrary(editor, renderer);
poseLib.mount(document.body);

const propsPanel = new ProportionsPanel(store, history);  // Phase 5
propsPanel.mount(document.body);

const bustDbg = new BustDebugPanel(store, history);       // Phase 5
bustDbg.mount(document.body);
document.getElementById('btn-bust-dbg').addEventListener('click', () => bustDbg.toggle());

const loadingOverlay = document.getElementById('loading-overlay');
const loadingMsg     = document.getElementById('loading-msg');
function showLoading(msg = 'Loading model…') { loadingMsg.textContent = msg; loadingOverlay.classList.remove('hidden'); }
function hideLoading() { loadingOverlay.classList.add('hidden'); }

let initScene = null;
try {
    const sceneParam = params.get('scene');
    if (sceneParam) initScene = jsonToScene(decodeURIComponent(sceneParam));
} catch { /* malformed */ }

showLoading(`Loading ${gender === 'F' ? 'female' : 'male'} model…`);
try {
    // Sync store proportions from scene if present
    if (initScene?.proportions) store.setProportions(initScene.proportions);
    await editor.buildMannequin(gender, initScene ?? defaultScene(gender));
    hideLoading();
} catch (err) {
    loadingMsg.textContent = `Failed to load model — ${err.message}`;
    loadingMsg.style.color = '#f44';
    document.querySelector('.spinner').style.display = 'none';
}

// ── Toolbar ──────────────────────────────────────────────────────────────────
const btnGender = document.getElementById('btn-gender');
btnGender.textContent = gender;
btnGender.addEventListener('click', async () => {
    if (btnGender.disabled) return;
    btnGender.disabled = true;
    const next = editor.gender === 'F' ? 'M' : 'F';
    showLoading(`Loading ${next === 'F' ? 'female' : 'male'} model…`);
    try {
        await editor.setGender(next);
        btnGender.textContent = next;
        // ProportionsPanel syncs bust visibility via store subscription
    } finally {
        btnGender.disabled = false;
        hideLoading();
    }
});

document.getElementById('btn-undo').addEventListener('click', () => editor.undo());
document.getElementById('btn-reset').addEventListener('click', () => editor.resetPose());
document.getElementById('btn-mirror-lr').addEventListener('click', () => editor.mirrorPose('L_to_R'));
document.getElementById('btn-mirror-rl').addEventListener('click', () => editor.mirrorPose('R_to_L'));
document.getElementById('btn-poses').addEventListener('click', () => poseLib.toggle());

let randomMode = 'safe';
const btnRandomMode = document.getElementById('btn-random-mode');
btnRandomMode.addEventListener('click', () => {
    randomMode = randomMode === 'safe' ? 'wild' : 'safe';
    btnRandomMode.textContent = randomMode === 'safe' ? '🔒' : '🔓';
    btnRandomMode.classList.toggle('wild', randomMode === 'wild');
    btnRandomMode.title = randomMode === 'safe'
        ? 'Safe: anatomical limits  |  click for Wild'
        : 'Wild: anything goes  |  click for Safe';
});
document.getElementById('btn-random').addEventListener('click', () => editor.generateRandomPose(randomMode));

const btnProps = document.getElementById('btn-props');
btnProps.addEventListener('click', () => {
    propsPanel.toggle();
    btnProps.classList.toggle('active', propsPanel.isVisible());
});

const btnColors = document.getElementById('btn-colors');
btnColors.addEventListener('click', () => {
    const current = store.getState().jointColorMode;
    const next    = current === 'openpose' ? 'flat' : 'openpose';
    store.setState({ jointColorMode: next });  // renderer reacts via subscription
    btnColors.textContent = next === 'openpose' ? 'OpenPose' : 'Flat';
    btnColors.classList.toggle('active', next === 'openpose');
});

// ── ComfyUI mode ─────────────────────────────────────────────────────────────
if (mode === 'comfyui') {
    new ComfyuiBridge(editor, renderer);
    const statusBar = document.getElementById('status-bar');
    const statusEl  = document.getElementById('status');
    statusBar.style.display = 'block';

    const btnSave = document.getElementById('btn-save');
    btnSave.style.display = 'inline-block';
    btnSave.addEventListener('click', () => {
        if (btnSave.disabled) return;
        btnSave.disabled = true;
        btnSave.textContent = 'Saving…';
        btnSave.classList.add('saving');
        statusEl.textContent = 'Uploading…';
        window.parent.postMessage(
            { cmd: 'mannequin', type: 'event', method: 'UserSaved' },
            window.location.origin
        );
        setTimeout(() => {
            btnSave.disabled = false;
            btnSave.textContent = 'Close & Save';
            btnSave.classList.remove('saving');
            if (statusEl.textContent === 'Uploading…') statusEl.textContent = 'Ready';
        }, 30000);
    });
}

// ── Standalone mode ───────────────────────────────────────────────────────────
if (mode === 'standalone') {
    const exportBar = document.getElementById('export-bar');
    exportBar.style.display = 'flex';

    function download(dataUrl, name) {
        const a = document.createElement('a');
        a.href = dataUrl; a.download = name; a.click();
    }
    function withFeedback(btn, fn) {
        btn.addEventListener('click', async () => {
            if (btn.disabled) return;
            btn.disabled = true;
            const orig = btn.textContent;
            btn.textContent = '…';
            try { fn(); } finally {
                btn.disabled = false;
                btn.textContent = orig;
            }
        });
    }
    withFeedback(document.getElementById('btn-dl-pose'),  () => { const { pose }  = renderer.captureImages(); download(pose,  'pose.png');  });
    withFeedback(document.getElementById('btn-dl-depth'), () => { const { depth } = renderer.captureImages(); download(depth, 'depth.png'); });
    withFeedback(document.getElementById('btn-dl-canny'), () => { const { canny } = renderer.captureImages(); download(canny, 'canny.png'); });
}

// ── Crop frame ────────────────────────────────────────────────────────────────
// Padding around the crop frame relative to canvas size.
// More at the bottom so characters have breathing room above the lower edge.
const CROP_PAD_TOP    = 0.04;
const CROP_PAD_BOTTOM = 0.09;   // bigger — floor room
const CROP_PAD_SIDE   = 0.04;

const cropFrame = document.getElementById('crop-frame');
function updateCropFrame() {
    const wrap = document.getElementById('canvas-wrap');
    const cW = wrap.clientWidth, cH = wrap.clientHeight;
    const oW = renderer.outputWidth, oH = renderer.outputHeight;
    if (!cW || !cH || !oW || !oH) { cropFrame.style.display = 'none'; return; }

    // Safe area — canvas minus padding
    const safeW  = cW * (1 - 2 * CROP_PAD_SIDE);
    const safeH  = cH * (1 - CROP_PAD_TOP - CROP_PAD_BOTTOM);
    const safeX0 = cW * CROP_PAD_SIDE;
    const safeY0 = cH * CROP_PAD_TOP;

    // Fit output aspect ratio inside safe area
    const safeAR   = safeW / safeH;
    const outputAR = oW / oH;
    let fW, fH;
    if (outputAR < safeAR) {
        fH = safeH; fW = safeH * outputAR;   // pillarbox inside safe area
    } else {
        fW = safeW; fH = safeW / outputAR;   // letterbox inside safe area
    }

    const fX = Math.round(safeX0 + (safeW - fW) / 2);
    const fY = Math.round(safeY0 + (safeH - fH) / 2);

    cropFrame.style.display = 'block';
    cropFrame.style.left   = fX + 'px';
    cropFrame.style.top    = fY + 'px';
    cropFrame.style.width  = Math.round(fW) + 'px';
    cropFrame.style.height = Math.round(fH) + 'px';
}

// Recalculate crop frame when canvas-wrap is resized
new ResizeObserver(updateCropFrame).observe(document.getElementById('canvas-wrap'));

// ── Render loop ───────────────────────────────────────────────────────────────
function loop() {
    requestAnimationFrame(loop);
    editor.update();
    if (renderer._dirty) {
        const wrap = document.getElementById('canvas-wrap');
        renderer.render(wrap.clientWidth, wrap.clientHeight);
        updateCropFrame();
    }
}
loop();
</script>
</body>
</html>
